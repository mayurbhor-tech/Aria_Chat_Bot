<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria | Personal AI Assistant</title>
    <style>
        /* ==========================================================================
           CSS VARIABLES & RESET
           ========================================================================== */
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: rgba(30, 41, 59, 0.7);
            --chat-bg: rgba(15, 23, 42, 0.6);
            --user-msg-bg: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bot-msg-bg: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-glow: rgba(99, 102, 241, 0.3);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        /* Floating Background Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #4f46e5; opacity: 0.2; }
        .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: #c026d3; opacity: 0.2; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* ==========================================================================
           SIDEBAR STYLES
           ========================================================================== */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #e879f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-new-chat {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .btn-new-chat:hover { background: rgba(255, 255, 255, 0.1); }

        .history-list {
            flex: 1;
            margin-top: 2rem;
            overflow-y: auto;
        }
        
        .history-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-item {
            padding: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }
        .history-item:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }

        .btn-clear {
            margin-top: auto;
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem;
            transition: opacity 0.2s;
        }
        .btn-clear:hover { opacity: 0.8; }

        /* ==========================================================================
           MAIN CHAT AREA STYLES
           ========================================================================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .mobile-header {
            display: none;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: space-between;
        }
        .hamburger {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-main);
            opacity: 1;
            transition: opacity 0.3s;
        }
        .welcome-screen h1 { margin-bottom: 1rem; font-size: 2.5rem; }
        .welcome-screen p { color: var(--text-secondary); max-width: 500px; }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-bubble {
            padding: 1rem 1.2rem;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .user .message-bubble {
            background: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-bubble {
            background: var(--bot-msg-bg);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-color);
        }

        .timestamp {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none; /* Hidden by default */
            align-self: flex-start;
            background: var(--bot-msg-bg);
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }
        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--text-secondary);
            animation: bounce 1.4s infinite ease-in-out both;
            margin: 0 2px;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-area {
            padding: 1.5rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 1rem 1.2rem;
            border-radius: 25px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-send {
            background: var(--user-msg-bg);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .btn-send svg {
            width: 20px;
            height: 20px;
            fill: white;
            margin-left: 2px;
            pointer-events: none; /* Ensures click passes to button */
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                left: -280px;
                box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            }
            .sidebar.active { left: 0; transform: translateX(0); }
            .mobile-header { display: flex; }
            .chat-container { padding: 1rem; }
            .input-area { padding: 1rem; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #818cf8;">
                <path d="M12 2a10 10 0 1 0 10 10H12V2z"></path>
                <path d="M12 12 2.1 10.5"></path>
                <path d="M12 12 8.5 2.1"></path>
            </svg>
            Aria
        </div>

        <button class="btn-new-chat" onclick="resetChat()">
            <span>+</span> New Chat
        </button>

        <div class="history-list">
            <div class="history-label">History</div>
            <div class="history-item">Intro to Python</div>
            <div class="history-item">Resume Tips</div>
            <div class="history-item">Flask vs Django</div>
        </div>

        <button class="btn-clear" onclick="clearHistoryUI()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            Clear Conversations
        </button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="mobile-header">
            <div class="brand">Aria</div>
            <button class="hamburger" id="hamburgerBtn">☰</button>
        </header>

        <div class="chat-container" id="chatContainer">
            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcomeScreen">
                <h1>How can I help you today?</h1>
                <p>I'm a rule-based AI. Ask me about Python, Web Development, Career advice, or just say hello!</p>
            </div>

            <!-- FIX: Typing indicator is now INSIDE chat-container so insertBefore works -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Message Aria..." autocomplete="off">
            </div>
            <button class="btn-send" id="sendBtn">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </footer>
    </main>

    <!-- ==========================================================================
       JAVASCRIPT
       ========================================================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatContainer = document.getElementById('chatContainer');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const typingIndicator = document.getElementById('typingIndicator');
            const welcomeScreen = document.getElementById('welcomeScreen');
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const sidebar = document.getElementById('sidebar');

            if (!sendBtn || !userInput || !chatContainer) {
                console.error("Critical Error: HTML elements not found.");
                alert("Error: Page elements missing.");
                return;
            }

            sendBtn.addEventListener('click', sendMessage);

            userInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            hamburgerBtn.addEventListener('click', () => {
                sidebar.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768) {
                    if (!sidebar.contains(e.target) && !hamburgerBtn.contains(e.target)) {
                        sidebar.classList.remove('active');
                    }
                }
            });

            async function sendMessage() {
                const text = userInput.value.trim();
                
                if (!text) {
                    userInput.focus();
                    userInput.style.borderColor = "#ef4444";
                    setTimeout(() => userInput.style.borderColor = "rgba(255, 255, 255, 0.1)", 500);
                    return;
                }

                if (welcomeScreen.style.display !== 'none') {
                    welcomeScreen.style.display = 'none';
                }

                addMessageToUI(text, 'user');
                userInput.value = '';
                showTyping(true);

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });

                    if (!response.ok) {
                        throw new Error('Network response was not ok: ' + response.statusText);
                    }

                    const data = await response.json();
                    showTyping(false);
                    addMessageToUI(data.response, 'assistant');

                } catch (error) {
                    console.error('Error:', error);
                    showTyping(false);
                    addMessageToUI("Sorry, I'm having trouble connecting to the server. Is `app.py` running?", 'assistant');
                }
            }

            function addMessageToUI(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message', sender);

                const bubble = document.createElement('div');
                bubble.classList.add('message-bubble');
                bubble.textContent = text;

                const timestamp = document.createElement('div');
                timestamp.classList.add('timestamp');
                const now = new Date();
                timestamp.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                messageDiv.appendChild(bubble);
                messageDiv.appendChild(timestamp);

                // This will now work because typingIndicator is a child of chatContainer
                chatContainer.insertBefore(messageDiv, typingIndicator);
                scrollToBottom();
            }

            function showTyping(show) {
                if (show) {
                    typingIndicator.style.display = 'block';
                    chatContainer.appendChild(typingIndicator);
                } else {
                    typingIndicator.style.display = 'none';
                }
                scrollToBottom();
            }

            function scrollToBottom() {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            window.resetChat = function() {
                const messages = document.querySelectorAll('.message');
                messages.forEach(msg => msg.remove());
                welcomeScreen.style.display = 'flex';
                sidebar.classList.remove('active');
            }

            window.clearHistoryUI = function() {
                const items = document.querySelectorAll('.history-item');
                items.forEach(item => item.remove());
            }
        });
    </script>
</body>
</html>
